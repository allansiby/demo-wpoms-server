name: server_deploy

on:
  push:
    branches:
      - master 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into EC2 and Redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to the repo
            cd /home/${{ secrets.EC2_USER }}/alan/wpoms-server/demo-wpoms-server

            # 2. Pull the latest code
            git pull origin master

            # 3. Stop and remove the existing container (ignore error if it doesn't exist)
            sudo docker stop wpoms_server || true
            sudo docker rm wpoms_server || true

            # 4. Build the new image
            sudo docker build -t wpoms_server .

            # 5. Run the new container
            sudo docker run -d --name wpoms_server -p 6666:8081 wpoms_server
