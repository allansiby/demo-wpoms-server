name: server_deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into EC2 and Redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Exit immediately if a command fails
            set -e

            # Navigate to project
            cd /home/${{ secrets.EC2_USER }}/alan/wpoms-server/demo-wpoms-server

            # Pull latest code
            git pull origin master

            # Build Spring Boot JAR
            ./mvnw clean package -DskipTests || mvn clean package -DskipTests

            # Stop and remove existing container
            sudo docker stop wpoms_server || true
            sudo docker rm wpoms_server || true

            # Remove old image (optional)
            sudo docker rmi wpoms_server || true

            # Build Docker image
            sudo docker build -t wpoms_server .

            # Run new container
            sudo docker run -d \
              --name wpoms_server \
              -p 6666:8081 \
              wpoms_server

            # Show running containers
            sudo docker ps